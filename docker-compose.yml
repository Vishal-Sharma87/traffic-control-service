version: "3.8"

services:
  database:
    image: mysql:latest
    container_name: traffic-control-service-mysql
    ports:
      - "3306:3306"
    environment:
        MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"

    volumes:
      - traffic-control-service-db-data:/var/lib/mysql

volumes:
    traffic-control-service-db-data:

